<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>路线街景</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    #map { position: absolute; left: -9999px; width: 1px; height: 1px; visibility: hidden; }
    #tip {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      color: #fff; background: rgba(0,0,0,0.7); padding: 14px 22px;
      border-radius: 22px; font-size: 14px; max-width: 80%; text-align: center;
    }
  </style>

  <!-- 取 URL 参数（要在加载腾讯 JS 之前完成，因为脚本里要拼 key） -->
  <script>
    function qs(name) {
      var m = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'))
      return m ? decodeURIComponent(m[1]) : ''
    }
    window._params = {
      KEY:     qs('key'),
      lat:     parseFloat(qs('lat')),
      lng:     parseFloat(qs('lng')),
      pano:    qs('pano'),
      heading: qs('heading') || '0',
      pitch:   qs('pitch')   || '0',
      radius:  parseInt(qs('radius') || '1000', 10)
    }
  </script>

  <!-- 同步加载腾讯 JS API：用 document.write 拼 src，避免异步 -->
  <script>
    var p = window._params
    if (p.KEY) {
      document.write(
        '<scr' + 'ipt src="https://map.qq.com/api/js?v=2.exp&key=' +
        encodeURIComponent(p.KEY) + '"></scr' + 'ipt>'
      )
    }
  </script>
</head>
<body>
  <div id="map"></div>
  <div id="tip">街景查找中…</div>

  <script>
    var p = window._params
    var tip = document.getElementById('tip')
    function showTip(t) { tip.innerText = t }

    function gotoStreetView(pano) {
      var url = 'https://apis.map.qq.com/uri/v1/streetview' +
        '?pano=' + encodeURIComponent(pano) +
        '&heading=' + encodeURIComponent(p.heading) +
        '&pitch=' + encodeURIComponent(p.pitch) +
        '&zoom=1' +
        '&referer=' + encodeURIComponent(p.KEY || 'ARRoadMap')
      location.replace(url)
    }

    function runWhenReady() {
      if (!window.qq || !qq.maps) {
        // 等一会再判断（最多 30 次 × 100ms = 3s）
        if (runWhenReady._n === undefined) runWhenReady._n = 0
        if (runWhenReady._n++ > 30) {
          showTip('地图脚本加载失败：key 可能未启用 JavaScript API')
          return
        }
        return setTimeout(runWhenReady, 100)
      }
      if (typeof qq.maps.PanoramaService !== 'function') {
        showTip('PanoramaService 不可用：当前 key 未启用 JavaScript API（v2 经典版）')
        return
      }
      try {
        var latLng = new qq.maps.LatLng(p.lat, p.lng)
        var svc = new qq.maps.PanoramaService()
        svc.getPano(latLng, p.radius, function (result) {
          var svid = result && (result.svid || (result.detail && result.detail.svid))
          if (svid) {
            gotoStreetView(svid)
          } else {
            showTip('该位置 ' + p.radius + 'm 范围内暂无街景')
          }
        })
      } catch (e) {
        showTip('街景查找异常：' + e.message)
      }
    }

    // 直接传了 pano 就跳过查找
    if (p.pano) {
      showTip('正在打开街景…')
      gotoStreetView(p.pano)
    } else if (!p.KEY || isNaN(p.lat) || isNaN(p.lng)) {
      showTip('参数缺失：需要 key + lat + lng，或者 pano')
    } else {
      // 等腾讯 JS 加载完
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        runWhenReady()
      } else {
        document.addEventListener('DOMContentLoaded', runWhenReady)
      }
    }
  </script>
</body>
</html>
